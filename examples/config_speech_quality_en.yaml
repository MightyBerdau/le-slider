# Speech Quality Slider Configuration (English)
#
# For measuring perceived quality of speech signals.
# Uses a 1-5 MOS-like (Mean Opinion Score) scale.
#
# Language: English
# Scale: 1-5 (Bad → Excellent)

name: speech_quality
min_val: 1
max_val: 5
init_val: 3
step: 0.1
marker_step: 1
better_at_high: true
language: en
slider_reversal: false
description: "Quality of the speech signal"

categories_dict:
  1: "Bad"
  2: "Poor"
  3: "Fair"
  4: "Good"
  5: "Excellent"

# Color feedback: red (bad) → green (excellent)
# Hue values for matplotlib HSV colormap: red ≈ 0.0, green ≈ 0.33
color_range_hsv: [0.03, 0.3]
