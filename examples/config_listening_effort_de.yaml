# Listening Effort Slider Configuration (German)
# 
# This configuration defines the ESCU (Effort Scale for Cognitive Understanding)
# slider used in the original project for measuring listening effort.
#
# Language: Deutsch (German)
# Scale: 1-14

name: listening_effort
min_val: 1
max_val: 14
init_val: 7
step: 0.1
marker_step: 1
better_at_high: false
language: de
slider_reversal: false
description: "Anstrengung erforderlich, um die Sprache zu verstehen (ESCU-Skala)"

# Category labels: only values with labels are shown
categories_dict:
  1: "mühelos"
  3: "sehr wenig anstrengend"
  5: "wenig anstrengend"
  7: "mittelgradig anstrengend"
  9: "deutlich anstrengend"
  11: "sehr anstrengend"
  13: "extrem anstrengend"
  14: "nur Störgeräusch"

# Color feedback: HSV hue range [0, 1]
# (0.03, 0.3) = green → red
color_range_hsv: [0.03, 0.3]
