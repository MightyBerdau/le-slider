# Listening Effort Slider Configuration (English)
# 
# English version of the ESCU (Effort Scale for Cognitive Understanding) slider
# for international research projects.
#
# Language: English
# Scale: 1-14

name: listening_effort
min_val: 1
max_val: 14
init_val: 7
step: 0.1
marker_step: 1
better_at_high: false
language: en
slider_reversal: false
description: "Effort required to understand the speech (ESCU scale)"

categories_dict:
  1: "effortless"
  3: "very little effort"
  5: "little effort"
  7: "moderate effort"
  9: "significant effort"
  11: "very much effort"
  13: "extreme effort"
  14: "noise only"

# Color feedback: green → red
color_range_hsv: [0.03, 0.3]
